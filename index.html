<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Películas en Cartelera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">CinePlus</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="pages/renta.html">Renta</a></li>
          <li class="nav-item"><a class="nav-link" href="pages/contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="bg-primary text-white text-center p-4">
    <h1>Películas en Cartelera</h1>
    <p class="lead">Consulta los estrenos y favoritos del público</p>
  </header>

  <main class="container py-4">
    <!-- Nuestro contenedor de carga con Spinner de Bootstrap -->
    <div id="spinner-container" class="text-center my-5 d-none">
      <div class="spinner-border text-primary" style="width: 4rem; height: 4rem;" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <p class="mt-3 fs-5 text-secondary">Obteniendo carteleras actualizadas...</p>
    </div>

    <!-- Inicialmente oculto para revelar con animaciones -->
    <div class="row" id="lista-peliculas" style="display: none;">
      <!-- Películas cargadas dinámicamente -->
    </div>
  </main>

  <footer class="bg-dark text-center text-white py-3">
    <small>&copy; 2024 CinePlus. Todos los derechos reservados.</small>
  </footer>

  <!-- Modal global para visualizar Tráilers -->
  <div class="modal fade" id="trailerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content bg-dark border-0">
        <div class="modal-header border-secondary text-white">
          <h5 class="modal-title" id="trailerModalLabel">Tráiler Oficial</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0 ratio ratio-16x9">
          <!-- Este input se cargará usando JS cuando el usuario elija la película -->
          <iframe id="trailerModalIframe" src="" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <!-- Bootstrap Script para la utilidad de los Modales -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
